<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Withdrawal - ACC INVESTMENT</title>
  <style>
    body {
      background-color: #000814;
      color: #d4af37;
      font-family: 'Poppins', sans-serif;
      text-align: center;
      padding: 40px;
    }
    h1 {
      color: #00ff88;
      font-size: 35px;
      margin-bottom: 30px;
    }
    form {
      max-width: 400px;
      margin: auto;
      background-color: #001d3d;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 0 10px #00ff88;
    }
    input, select {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 15px;
      text-align: center;
    }
    button {
      background-color: #00ff88;
      color: #000;
      border: none;
      padding: 12px 25px;
      font-size: 16px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 10px;
    }
    button:hover {
      background-color: #d4af37;
      color: #000;
    }

    /* Popup modal styles */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.8);
    }
    .modal-content {
      background-color: #001d3d;
      margin: 15% auto;
      padding: 20px;
      border: 2px solid #00ff88;
      border-radius: 15px;
      width: 80%;
      max-width: 350px;
      color: #d4af37;
      box-shadow: 0 0 15px #00ff88;
    }
    .close-btn {
      background-color: #d4af37;
      color: #000;
      border: none;
      padding: 8px 20px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 15px;
    }
    .close-btn:hover {
      background-color: #00ff88;
      color: #000;
    }
  </style>
  <script>
    // Auto language detection - Belgium (BE)
    document.addEventListener("DOMContentLoaded", () => {
      fetch("https://ipapi.co/json/")
        .then(response => response.json())
        .then(data => {
          if (data.country_code === "BE") {
            // Optional: Dutch (Flemish) adaptation - common in northern Belgium
            // You can uncomment or adjust for French (Wallonia) if needed
            document.querySelector("h1").innerText = "Opname - ACC INVESTERING";
            document.getElementById("iban").placeholder = "IBAN (bijv. BE68 5390 0754 7034)";
            document.getElementById("accname").placeholder = "Naam rekeninghouder";
            document.getElementById("withdrawBtn").innerText = "Opnemen";
            document.getElementById("backBtn").innerText = "Terug";
            document.querySelector("label[for='iban']").innerText = "IBAN";
            document.querySelector("label[for='accname']").innerText = "Rekeninghouder";
          }
        })
        .catch(() => {});
    });

    // Show styled popup modal
    function showFee() {
      document.getElementById("feeModal").style.display = "block";
    }

    // Close modal
    function closeModal() {
      document.getElementById("feeModal").style.display = "none";
    }
  </script>
</head>
<body>
  <h1>Withdrawal - ACC INVESTMENT</h1>

  <form onsubmit="event.preventDefault(); showFee();">
    <label for="iban">IBAN</label><br>
    <input type="text" id="iban" placeholder="IBAN (e.g. BE68539007547034)" required pattern="BE[0-9]{2}[ ]?[0-9]{4}[ ]?[0-9]{4}[ ]?[0-9]{4}[ ]?[0-9]{2}"><br>
    
    <label for="accname">Account Holder Name</label><br>
    <input type="text" id="accname" placeholder="Bank Account Name" value="Andrea Van Den Langenbergh" required><br>
    
    <label for="bank">Bank</label><br>
    <select id="bank" required>
      <option value="BNP Paribas Fortis" selected>BNP Paribas Fortis</option>
      <!-- Only one bank as per request; add others if needed later -->
    </select><br>
    
    <label for="amount">Amount Available</label><br>
    <input type="text" id="amount" value="38.000 €" readonly><br>
    
    <button type="submit" id="withdrawBtn">Withdraw</button>
    <button type="button" id="backBtn" onclick="window.location.href='index.html'">Back</button>
  </form>

  <!-- Styled Popup Modal -->
  <div id="feeModal" class="modal">
    <div class="modal-content">
      <h3>Withdrawal fee of 400 € is required.</h3>
      <p>Net amount after fee: 37.600 €</p>
      <p>Will be transferred to your BNP Paribas Fortis account in Belgium.</p>
      <button class="close-btn" onclick="closeModal()">Close</button>
    </div>
  </div>
</body>
</html>
